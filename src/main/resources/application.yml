spring:
  application:
    name: peluqueria-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway es el dueño del esquema. Hibernate solo valida que el modelo coincida.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Permite adoptar Flyway sobre una BD ya existente (creada antes por ddl-auto):
    # si el esquema no esta vacio y no hay historial, lo marca como baseline en vez de fallar.
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  seed: ${APP_SEED:false}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://placeholder.tu-dominio.com}
  jwt:
    secret: ${APP_JWT_SECRET:cambiame-en-produccion-este-secreto-debe-tener-al-menos-256-bits-de-largo-1234567890}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    issuer: peluqueria-backend

notificacion:
  provider: ${NOTIFICACION_PROVIDER:mock}

logging:
  level:
    com.mab.peluqueria: INFO
    org.springframework.security: INFO
