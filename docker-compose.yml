version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: peluqueria-mysql
    restart: always
    environment:
      MYSQL_DATABASE: peluqueria
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${DB_PASSWORD:-root_password_here}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: peluqueria-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=peluqueria
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root_password_here}
      - APP_JWT_SECRET=${APP_JWT_SECRET:-cambiame-en-produccion-este-secreto-debe-tener-al-menos-256-bits-de-largo-1234567890}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:5173}
      - DB_USE_SSL=false
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
